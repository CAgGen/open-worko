# 一条 `podman-compose up` 起整个中立服务器。
# 开发 = 测试 = 部署同一个镜像；上 VPS 也是这一份 + `up -d`。
services:
  worko-server:
    build:
      context: .
      dockerfile: Containerfile
    container_name: worko-server
    ports:
      - "8080:8080"          # HTTP + WebSocket 同口
    volumes:
      - worko-data:/data     # SQLite 持久化
    environment:
      - PORT=8080
      - DB_PATH=/data/worko.db
      - WORKO_TOKEN=${WORKO_TOKEN:-dev-secret}   # 一上公网必须设；本地默认 dev-secret
    restart: unless-stopped

volumes:
  worko-data:
